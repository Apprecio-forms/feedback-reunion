<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de Satisfacción - Apprecio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --apprecio-pink: #ff3366; --dark-text: #2d2d2d; }
        body { font-family: 'Poppins', sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; padding: 20px; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; max-width: 550px; width: 100%; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #ddd; box-sizing: border-box; }
        
        /* Ajuste del Logo */
        .logo-container { text-align:center; margin-bottom: 25px; }
        .logo-img { width: 80px !important; height: auto; display: inline-block; }

        .introduccion { text-align: center; color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        
        .question-label { display: block; font-weight: 600; margin-bottom: 12px; font-size: 14px; color: var(--dark-text); }
        .required-star { color: var(--apprecio-pink); margin-left: 3px; }
        
        .input-field { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 12px; box-sizing: border-box; margin-bottom: 25px; font-family: inherit; font-size: 14px; transition: 0.3s; }
        .input-field:focus { border-color: var(--apprecio-pink); outline: none; border-width: 2px; }

        .scale-10 { display: flex; justify-content: space-between; gap: 4px; margin-bottom: 5px; }
        .scale-item { flex: 1; text-align: center; }
        .scale-item input { display: none; }
        .scale-item label { display: block; border: 1px solid #eee; padding: 10px 0; cursor: pointer; border-radius: 8px; background: #fff; font-weight: 600; transition: 0.2s; font-size: 13px; }
        .scale-item input:checked + label { background: var(--apprecio-pink); color: white; border-color: var(--apprecio-pink); transform: translateY(-2px); box-shadow: 0 4px 8px rgba(255, 51, 102, 0.3); }
        
        .legend { display: flex; justify-content: space-between; color: #999; font-size: 11px; margin-bottom: 35px; }
        .seccion-titulo { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--apprecio-pink); margin-bottom: 10px; letter-spacing: 1px; }
        
        textarea { min-height: 110px; resize: none; width: 100%; }

        .btn-submit { width: 100%; background: var(--apprecio-pink); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 800; cursor: pointer; box-shadow: 0 5px 0 #d11f4a; font-size: 16px; margin-top: 10px; transition: 0.1s; text-transform: uppercase; }
        .btn-submit:active { transform: translateY(4px); box-shadow: 0 0px 0 #d11f4a; }
        .btn-submit:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
        
        #success-msg { display: none; text-align: center; padding: 20px 0; }
        .success-icon { font-size: 60px; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <div id="form-content">
            <div class="logo-container">
                <img src="https://lh3.googleusercontent.com/d/1BgDDHoP3ve2r1k3-Z27LMA_YamEQkFee" alt="Apprecio Logo" class="logo-img">
            </div>

            <div class="introduccion">
                Tu opinión es clave para nosotros. Por favor, tómate un minuto para calificar la gestión de nuestro ejecutivo en tu última reunión comercial.
            </div>
            
            <form id="surveyForm">
                <input type="hidden" name="email" id="emailInput">

                <!-- Pregunta 1 -->
                <label class="question-label">1. ¿Qué tan satisfecho estás con la gestión de tu ejecutivo comercial?<span class="required-star">*</span></label>
                <div class="scale-10">
                    <div class="scale-item"><input type="radio" name="csat_gestion" value="1" id="q1_1" required><label for="q1_1">1</label></div>
                    <div class="scale-item"><input type="radio" name="csat_gestion" value="2" id="q1_2"><label for="q1_2">2</label></div>
                    <div class="scale-item"><input type="radio" name="csat_gestion" value="3" id="q1_3"><label for="q1_3">3</label></div>
                    <div class="scale-item"><input type="radio" name="csat_gestion" value="4" id="q1_4"><label for="q1_4">4</label></div>
                    <div class="scale-item"><input type="radio" name="csat_gestion" value="5" id="q1_5"><label for="q1_5">5</label></div>
                    <div class="scale-item"><input type="radio" name="csat_gestion" value="6" id="q1_6"><label for="q1_6">6</label></div>
                    <div class="scale-item"><input type="radio" name="csat_gestion" value="7" id="q1_7"><label for="q1_7">7</label></div>
                    <div class="scale-item"><input type="radio" name="csat_gestion" value="8" id="q1_8"><label for="q1_8">8</label></div>
                    <div class="scale-item"><input type="radio" name="csat_gestion" value="9" id="q1_9"><label for="q1_9">9</label></div>
                    <div class="scale-item"><input type="radio" name="csat_gestion" value="10" id="q1_10"><label for="q1_10">10</label></div>
                </div>
                <div class="legend"><span>Nada satisfecho</span><span>Muy satisfecho</span></div>

                <!-- Pregunta 2 -->
                <label class="question-label">2. ¿Qué tan oportuna consideras la respuesta del ejecutivo a tus solicitudes (cotizaciones, pedidos o soporte)?<span class="required-star">*</span></label>
                <div class="scale-10">
                    <div class="scale-item"><input type="radio" name="csat_respuesta" value="1" id="q2_1" required><label for="q2_1">1</label></div>
                    <div class="scale-item"><input type="radio" name="csat_respuesta" value="2" id="q2_2"><label for="q2_2">2</label></div>
                    <div class="scale-item"><input type="radio" name="csat_respuesta" value="3" id="q2_3"><label for="q2_3">3</label></div>
                    <div class="scale-item"><input type="radio" name="csat_respuesta" value="4" id="q2_4"><label for="q2_4">4</label></div>
                    <div class="scale-item"><input type="radio" name="csat_respuesta" value="5" id="q2_5"><label for="q2_5">5</label></div>
                    <div class="scale-item"><input type="radio" name="csat_respuesta" value="6" id="q2_6"><label for="q2_6">6</label></div>
                    <div class="scale-item"><input type="radio" name="csat_respuesta" value="7" id="q2_7"><label for="q2_7">7</label></div>
                    <div class="scale-item"><input type="radio" name="csat_respuesta" value="8" id="q2_8"><label for="q2_8">8</label></div>
                    <div class="scale-item"><input type="radio" name="csat_respuesta" value="9" id="q2_9"><label for="q2_9">9</label></div>
                    <div class="scale-item"><input type="radio" name="csat_respuesta" value="10" id="q2_10"><label for="q2_10">10</label></div>
                </div>
                <div class="legend"><span>Nada oportuna</span><span>Muy oportuna</span></div>

                <!-- Pregunta 3 -->
                <label class="question-label">3. ¿Qué tan proactivo es el ejecutivo al sugerirte mejoras o nuevas oportunidades para tu empresa?<span class="required-star">*</span></label>
                <div class="scale-10">
                    <div class="scale-item"><input type="radio" name="csat_proactividad" value="1" id="q3_1" required><label for="q3_1">1</label></div>
                    <div class="scale-item"><input type="radio" name="csat_proactividad" value="2" id="q3_2"><label for="q3_2">2</label></div>
                    <div class="scale-item"><input type="radio" name="csat_proactividad" value="3" id="q3_3"><label for="q3_3">3</label></div>
                    <div class="scale-item"><input type="radio" name="csat_proactividad" value="4" id="q3_4"><label for="q3_4">4</label></div>
                    <div class="scale-item"><input type="radio" name="csat_proactividad" value="5" id="q3_5"><label for="q3_5">5</label></div>
                    <div class="scale-item"><input type="radio" name="csat_proactividad" value="6" id="q3_6"><label for="q3_6">6</label></div>
                    <div class="scale-item"><input type="radio" name="csat_proactividad" value="7" id="q3_7"><label for="q3_7">7</label></div>
                    <div class="scale-item"><input type="radio" name="csat_proactividad" value="8" id="q3_8"><label for="q3_8">8</label></div>
                    <div class="scale-item"><input type="radio" name="csat_proactividad" value="9" id="q3_9"><label for="q3_9">9</label></div>
                    <div class="scale-item"><input type="radio" name="csat_proactividad" value="10" id="q3_10"><label for="q3_10">10</label></div>
                </div>
                <div class="legend"><span>Nada proactivo</span><span>Muy proactivo</span></div>

                <!-- Pregunta 4 -->
                <div class="seccion-titulo">Tu opinión</div>
                <label class="question-label">4. ¿Qué fue lo más valioso de la reunión y qué podríamos mejorar?<span class="required-star">*</span></label>
                <textarea name="abierta" class="input-field" placeholder="Escribe aquí tus comentarios..." required></textarea>

                <button type="submit" class="btn-submit" id="submitBtn">ENVIAR ENCUESTA</button>
            </form>
        </div>

        <div id="success-msg">
            <div class="logo-container">
                <img src="https://lh3.googleusercontent.com/d/1BgDDHoP3ve2r1k3-Z27LMA_YamEQkFee" alt="Apprecio Logo" class="logo-img">
            </div>
            <span class="success-icon">✅</span>
            <h2 style="font-weight: 800; color: var(--dark-text); margin-top: 0;">¡Muchas gracias!</h2>
            <p style="color: #666; line-height: 1.6;">Tu feedback ha sido enviado con éxito.</p>
        </div>
    </div>

    <script>
    // 1. CAPTURAR EL EMAIL DE LA URL (?utm_email=...)
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const emailFromUrl = urlParams.get('utm_email');
        
        if (emailFromUrl) {
            document.getElementById('emailInput').value = emailFromUrl;
            console.log("Email capturado con éxito:", emailFromUrl);
        }
    };

    // 2. CONFIGURACIÓN DE ENVÍO
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxlIqAXer58v2dUjkiuKhPXtz546XTcltDPULpjsgrllnOQDtHvbOUYjQE2A2PFa1SN/exec"; 

    document.getElementById('surveyForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        
        btn.disabled = true;
        btn.innerText = 'ENVIANDO...';

        const formData = new FormData(this);
        const params = new URLSearchParams(formData);

        fetch(WEB_APP_URL + "?" + params.toString(), {
            method: 'GET',
            mode: 'no-cors'
        }).then(() => {
            document.getElementById('form-content').style.display = 'none';
            document.getElementById('success-msg').style.display = 'block';
            window.scrollTo(0,0);
        }).catch(err => {
            alert("Error al enviar la encuesta.");
            btn.disabled = false;
            btn.innerText = 'ENVIAR ENCUESTA';
        });
    };
</script>
</body>
</html>
